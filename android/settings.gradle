pluginManagement {
  def reactNativeGradlePlugin = new File(
    providers.exec {
      workingDir(rootDir)
      commandLine("node", "--print", "require.resolve('@react-native/gradle-plugin/package.json', { paths: [require.resolve('react-native/package.json')] })")
    }.standardOutput.asText.get().trim()
  ).getParentFile().absolutePath
  includeBuild(reactNativeGradlePlugin)
  
  def expoPluginsPath = new File(
    providers.exec {
      workingDir(rootDir)
      commandLine("node", "--print", "require.resolve('expo-modules-autolinking/package.json', { paths: [require.resolve('expo/package.json')] })")
    }.standardOutput.asText.get().trim(),
    "../android/expo-gradle-plugin"
  ).absolutePath
  includeBuild(expoPluginsPath)
}

plugins {
  id("com.facebook.react.settings")
  id("expo-autolinking-settings")
}

// Force Stripe to resolve from Maven Central only, never from JitPack
// This prevents timeout issues when Gradle tries to check JitPack for Stripe
dependencyResolutionManagement {
  // PREFER_PROJECT allows both settings and project-level repositories
  // This is needed for Expo modules which require project repositories
  // Settings repositories (Maven Central) will still be checked first for Stripe
  repositoriesMode.set(RepositoriesMode.PREFER_PROJECT)
  repositories {
    google()
    mavenCentral() {
      // Prioritize Maven Central for all dependencies, especially Stripe
      content {
        includeGroup("com.stripe")
        includeGroupByRegex("com\\.stripe\\..*")
      }
    }
    // JitPack explicitly NOT added here to prevent Stripe timeout
    // VideoSDK works fine without JitPack (USB camera code is patched)
  }
}

// WebRTC duplicate fix: react-native.config.js excludes react-native-webrtc from autolinking.
// Only @videosdk.live/react-native-webrtc (VideoSDK) should be linked to avoid PackageList.java
// "WebRTCModulePackage" name clash with com.oney.WebRTCModule.
extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
  if (System.getenv('EXPO_USE_COMMUNITY_AUTOLINKING') == '1') {
    ex.autolinkLibrariesFromCommand()
  } else {
    ex.autolinkLibrariesFromCommand(expoAutolinking.rnConfigCommand)
  }
}
expoAutolinking.useExpoModules()

rootProject.name = 'ASAB'

expoAutolinking.useExpoVersionCatalog()

include ':app'
includeBuild(expoAutolinking.reactNativeGradlePlugin)
