// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral() {
      // Prioritize Maven Central for Stripe dependencies
      content {
        includeGroup("com.stripe")
        includeGroupByRegex("com\\.stripe\\..*")
      }
    }
    // JitPack REMOVED - USB camera code is patched, dependencies excluded
    // This prevents Stripe timeout issue (Stripe tries to resolve from JitPack)
    // VideoSDK will work fine without JitPack since USB camera support is disabled
  }
  
  // VideoSDK dependency fix - exclude all problematic USB camera libraries
  // These libraries are not needed for mobile devices (only for USB cameras)
  configurations.all {
    exclude group: 'com.github.jiangdongguo.AndroidUSBCamera'
    // Exclude standalone react-native-webrtc (com.oney) if pulled in transitively; we use VideoSDK's WebRTC only.
    exclude group: 'com.oney.WebRTCModule', module: 'react-native-webrtc'
    
    // Force Stripe to resolve from Maven Central only
    resolutionStrategy {
      preferProjectModules()
      // Force Maven Central resolution order for Stripe
      eachDependency { details ->
        if (details.requested.group == 'com.stripe') {
          details.because 'Stripe must resolve from Maven Central, not JitPack'
        }
      }
    }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
